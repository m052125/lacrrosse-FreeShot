<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フリシュー記録ダッシュボード</title>
    <style>
        /* === 全体の設定 === */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #2E7D32;
            background-image: radial-gradient(#388E3C 15%, transparent 16%), radial-gradient(#388E3C 15%, transparent 16%);
            background-size: 15px 15px;
            background-position: 0 0, 7.5px 7.5px;
            margin: 0; padding: 10px;
            color: #333;
            display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            overflow: hidden;
        }

        .main-container {
            display: flex; flex-grow: 1;
            justify-content: space-between; gap: 10px;
            height: calc(100vh - 120px);
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        h3 { margin-top: 0; margin-bottom: 8px; text-align: center; color: #1b5e20; font-size: 15px; }

        /* === ① 左パネル：選手一覧 === */
        .left-panel { flex: 0 0 230px; }

        .add-member-form {
            display: flex; gap: 5px; margin-bottom: 10px;
            border-bottom: 2px solid #ccc; padding-bottom: 10px;
        }
        .add-member-form input { flex-grow: 1; padding: 8px; border-radius: 6px; border: 1px solid #999; font-size: 14px; }
        .add-member-form button { padding: 8px 12px; background-color: #388E3C; color: white; border-color: #1b5e20; border-radius: 6px; cursor: pointer;}

        .shooter-grid-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .shooter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }

        button.shooter-btn {
            background-color: #f1f8e9; border: 2px solid #aed581; border-radius: 15px;
            padding: 8px 0; font-size: 14px; font-weight: bold; color: #33691e;
            cursor: pointer; transition: 0.1s; width: 100%; box-sizing: border-box;
            box-shadow: 1px 2px 0px rgba(0,0,0,0.2);
        }
        button.shooter-btn:active { transform: translateY(1px); box-shadow: 0px 1px 0px rgba(0,0,0,0.2); }
        button.shooter-btn.selected { background-color: #ff9800; border-color: #e65100; color: white; }

        /* === ② 中央パネル：UIエリア === */
        .center-panel {
            flex: 2; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 0;
        }
        
        .course-grid {
            display: grid; grid-template-columns: repeat(3, 70px); gap: 8px;
            margin-top: 10px; margin-bottom: 15px;
            position: relative; z-index: 10;
        }
        .course-grid button {
            height: 70px; font-size: 28px; background-color: #8bc34a; color: white; border-color: #689f38;
            border-radius: 12px; border-width: 3px; font-weight: bold; cursor: pointer;
        }
        .course-grid button.selected { background-color: #ff9800; border-color: #e65100; }

        .svg-container {
            width: 100%; max-width: 480px; position: relative;
            margin-top: -30px; /* コースグリッドの下に食い込ませる */
        }
        
        .area-path { stroke: #000; stroke-width: 2; cursor: pointer; transition: 0.1s; }
        .area-path.orange { fill: #FFCC80; }
        .area-path.pink { fill: #F48FB1; }
        .area-path:hover { opacity: 0.8; }
        .area-path.selected { fill: #00E676; stroke: #00C853; stroke-width: 5; }
        .area-text { fill: #fff; font-size: 24px; font-weight: bold; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }

        /* 復活：打つ位置ボタン */
        .pos-row {
            display: flex; justify-content: center; gap: 8px; width: 100%; margin-top: 5px; margin-bottom: 10px;
        }
        .pos-row button {
            background-color: #f5f5f5; border: 2px solid #ccc; border-radius: 8px;
            padding: 10px 15px; font-size: 15px; font-weight: bold; color: #333; cursor: pointer;
        }
        .pos-row button.selected { background-color: #ff9800; border-color: #e65100; color: white; }

        /* === ③ 右パネル：ゴーリー＆ステータス === */
        .right-panel { flex: 1; }
        .right-panel select { width: 100%; font-size: 18px; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #ccc;}
        
        #statusBox {
            background: #263238; color: #eceff1; padding: 15px; border-radius: 8px;
            font-size: 16px; line-height: 1.8; font-weight: bold; flex-grow: 1;
        }
        .val { color: #64ffda; }

        /* === ④ 下部：結果送信パネル === */
        .bottom-panel {
            background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px;
            margin-top: 10px; display: flex; justify-content: center; gap: 10px;
            height: 70px; align-items: center; box-shadow: 0 -4px 6px rgba(0,0,0,0.2);
        }
        .result-btn {
            background-color: #eeeeee; border: 2px solid #9e9e9e; border-radius: 8px;
            padding: 10px 18px; font-size: 16px; font-weight: bold; color: #424242;
            cursor: pointer; width: auto; box-shadow: 1px 2px 0px rgba(0,0,0,0.1);
        }
        .result-btn:active { transform: translateY(1px); box-shadow: 0px 1px 0px rgba(0,0,0,0.1); }
        .btn-goal { background-color: #ffcdd2; border-color: #f44336; color: #b71c1c; }
        .btn-save { background-color: #bbdefb; border-color: #2196f3; color: #0d47a1; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-panel panel">
            <h3>🏃 選手</h3>
            <div class="add-member-form">
                <input type="text" id="addMemberInput" placeholder="背番号(例: 99)">
                <button onclick="addMember()">追加</button>
            </div>
            <div class="shooter-grid-container">
                <div class="shooter-grid" id="shooterGrid">
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#0', this)">#0</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#10', this)">#10</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#32', this)">#32</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#01', this)">#01</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#12', this)">#12</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#33', this)">#33</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#02', this)">#02</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#13', this)">#13</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#55', this)">#55</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#05', this)">#05</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#15', this)">#15</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#56', this)">#56</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#06', this)">#06</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#17', this)">#17</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#57', this)">#57</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#07', this)">#07</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#18', this)">#18</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#72', this)">#72</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#08', this)">#08</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#21', this)">#21</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#77', this)">#77</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#09', this)">#09</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#28', this)">#28</button>
                    <button class="shooter-btn" data-category="shooter" onclick="selectItem('shooter', '#98', this)">#98</button>
                </div>
            </div>
        </div>

        <div class="center-panel panel">
            <div class="course-grid">
                <button data-category="target" onclick="selectItem('target', '1', this)">1</button>
                <button data-category="target" onclick="selectItem('target', '2', this)">2</button>
                <button data-category="target" onclick="selectItem('target', '3', this)">3</button>
                <button data-category="target" onclick="selectItem('target', '4', this)">4</button>
                <button data-category="target" onclick="selectItem('target', '5', this)">5</button>
                <button data-category="target" onclick="selectItem('target', '6', this)">6</button>
                <button data-category="target" onclick="selectItem('target', '7', this)">7</button>
                <button data-category="target" onclick="selectItem('target', '8', this)">8</button>
                <button data-category="target" onclick="selectItem('target', '9', this)">9</button>
            </div>

            <div class="svg-container">
                <svg viewBox="0 0 500 240" width="100%" height="auto">
                    <path class="area-path pink" d="M 50,0 A 200,200 0 0,0 80.9,117.6 L 140.45,88.2 A 130,130 0 0,1 180,0 Z" data-category="area" onclick="selectItem('area', '6', this)"></path>
                    <text x="110" y="50" class="area-text">6</text>
                    
                    <path class="area-path orange" d="M 80.9,117.6 A 200,200 0 0,0 161.8,190.2 L 201.35,142.65 A 130,130 0 0,1 140.45,88.2 Z" data-category="area" onclick="selectItem('area', '7', this)"></path>
                    <text x="165" y="140" class="area-text">7</text>
                    
                    <path class="area-path pink" d="M 161.8,190.2 A 200,200 0 0,0 250,200 L 250,130 A 130,130 0 0,1 201.35,142.65 Z" data-category="area" onclick="selectItem('area', '8', this)"></path>
                    <text x="220" y="165" class="area-text">8</text>
                    
                    <path class="area-path orange" d="M 250,200 A 200,200 0 0,0 338.2,190.2 L 298.65,142.65 A 130,130 0 0,1 250,130 Z" data-category="area" onclick="selectItem('area', '9', this)"></path>
                    <text x="280" y="165" class="area-text">9</text>
                    
                    <path class="area-path pink" d="M 338.2,190.2 A 200,200 0 0,0 419.1,117.6 L 359.55,88.2 A 130,130 0 0,1 298.65,142.65 Z" data-category="area" onclick="selectItem('area', '10', this)"></path>
                    <text x="360" y="140" class="area-text">10</text>
                    
                    <path class="area-path orange" d="M 180,0 A 70,70 0 0,0 193.17,61.16 L 213.17,11.16 A 130,130 0 0,1 250,0 Z" data-category="area" onclick="selectItem('area', '1', this)"></path>
                    <text x="215" y="30" class="area-text">1</text>
                    
                    <path class="area-path pink" d="M 193.17,61.16 A 70,70 0 0,0 223.17,86.16 L 243.17,36.16 A 130,130 0 0,1 213.17,11.16 Z" data-category="area" onclick="selectItem('area', '2', this)"></path>
                    <text x="225" y="60" class="area-text">2</text>
                    
                    <path class="area-path orange" d="M 223.17,86.16 A 70,70 0 0,0 250,90 L 250,20 A 130,130 0 0,1 243.17,36.16 Z" data-category="area" onclick="selectItem('area', '3', this)"></path>
                    <text x="240" y="75" class="area-text">3</text>
                    
                    <path class="area-path pink" d="M 250,90 A 70,70 0 0,0 276.83,86.16 L 256.83,36.16 A 130,130 0 0,1 250,20 Z" data-category="area" onclick="selectItem('area', '4', this)"></path>
                    <text x="260" y="75" class="area-text">4</text>
                    
                    <path class="area-path orange" d="M 276.83,86.16 A 70,70 0 0,0 306.83,61.16 L 286.83,11.16 A 130,130 0 0,1 256.83,36.16 Z" data-category="area" onclick="selectItem('area', '5', this)"></path>
                    <text x="275" y="60" class="area-text">5</text>
                </svg>
            </div>

            <div class="pos-row">
                <button data-category="pos" onclick="selectItem('pos', '左2', this)">左2</button>
                <button data-category="pos" onclick="selectItem('pos', '左1', this)">左1</button>
                <button data-category="pos" onclick="selectItem('pos', '中央', this)">中央</button>
                <button data-category="pos" onclick="selectItem('pos', '右1', this)">右1</button>
                <button data-category="pos" onclick="selectItem('pos', '右2', this)">右2</button>
            </div>
        </div>

        <div class="right-panel panel">
            <h3>🧤 ゴーリー</h3>
            <select id="goalieSelect">
                <option value="#87 まりも">#87 まりも</option>
                <option value="#94 えぷ">#94 えぷ</option>
            </select>

            <div id="statusBox">
                👤 選手: <span id="lblShooter" class="val">未選択</span><br>
                📍 位置: <span id="lblPos" class="val">未選択</span><br>
                🗺️ エリア: <span id="lblArea" class="val">未選択</span><br>
                🎯 コース: <span id="lblTarget" class="val">未選択</span>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <button class="result-btn btn-goal" onclick="recordResult('ゴール')">ゴール</button>
        <button class="result-btn btn-save" onclick="recordResult('セーブ')">セーブ</button>
        <button class="result-btn" onclick="recordResult('枠外')">枠外</button>
        <button class="result-btn" onclick="recordResult('キープミス')">キープミス</button>
    </div>

    <script>
        // --- フォーム設定 ---
        const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSfj6tmsihXcLB0IrSAJOmEoc6wmpn_5uTDC4xEVc-jb_eGh_g/formResponse";
        const entries = {
            goalie: "entry.936925429",
            shooter: "entry.2097307624",
            pos: "entry.1120779862", // ★復活
            area: "entry.XXXXX",   // ★新しいエリアのentry番号に書き換えてください
            target: "entry.1657406525",
            result: "entry.1439118581"
        };

        // ★pos（位置）を管理用データに追加復活
        let currentData = { shooter: "", pos: "", area: "", target: "" };

        function selectItem(category, value, element) {
            currentData[category] = value;
            updateStatusText();

            let elements = document.querySelectorAll(`[data-category='${category}']`);
            elements.forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function updateStatusText() {
            document.getElementById("lblShooter").innerText = currentData.shooter || "未選択";
            document.getElementById("lblPos").innerText = currentData.pos || "未選択"; // ★復活
            document.getElementById("lblArea").innerText = currentData.area || "未選択";
            document.getElementById("lblTarget").innerText = currentData.target || "未選択";
        }

        function recordResult(resultValue) {
            // ★未入力チェックに pos を追加
            if (!currentData.shooter || !currentData.pos || !currentData.area || !currentData.target) {
                alert("未入力の項目があります！");
                return;
            }

            const goalieValue = document.getElementById("goalieSelect").value;
            const formData = new URLSearchParams();
            formData.append(entries.goalie, goalieValue);
            formData.append(entries.shooter, currentData.shooter);
            formData.append(entries.pos, currentData.pos); // ★復活
            formData.append(entries.area, currentData.area);
            formData.append(entries.target, currentData.target);
            formData.append(entries.result, resultValue);

            fetch(formURL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            }).then(() => {
                // シューター以外をリセット
                currentData.pos = ""; currentData.area = ""; currentData.target = "";
                updateStatusText();
                
                // 選択ハイライトを消す（posを含める）
                document.querySelectorAll("[data-category='pos'], [data-category='area'], [data-category='target']").forEach(el => el.classList.remove('selected'));
                
                alert("✅ " + resultValue + " を記録しました！");
            }).catch((error) => {
                alert("エラー: 通信に失敗しました");
            });
        }

        function addMember() {
            const input = document.getElementById('addMemberInput');
            const number = input.value.trim();
            if (!number) return;
            const formattedNumber = number.startsWith('#') ? number : '#' + number;
            const grid = document.getElementById('shooterGrid');
            const newButton = document.createElement('button');
            newButton.className = 'shooter-btn';
            newButton.setAttribute('data-category', 'shooter');
            newButton.setAttribute('onclick', `selectItem('shooter', '${formattedNumber}', this)`);
            newButton.innerText = formattedNumber;
            grid.appendChild(newButton);
            input.value = '';
        }
    </script>
</body>
</html>
